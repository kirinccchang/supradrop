name: Sync to lawreview.tools

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages rebuild
        run: |
          curl -s -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
